name: ci-cd

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ vars.IMAGE_REPOSITORY || format('{0}/sonar-k8s-demo', github.repository_owner) }}
  K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE || 'demo-app' }}

jobs:
  test-and-sonar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod

      - name: Run tests with coverage
        run: |
          go test ./... -coverprofile=coverage.out

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: app

  build-and-push:
    runs-on: ubuntu-latest
    needs: test-and-sonar
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Write kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Ensure namespace exists
        run: |
          kubectl get ns "${K8S_NAMESPACE}" >/dev/null 2>&1 || kubectl create ns "${K8S_NAMESPACE}"

      - name: Apply app manifests
        run: |
          sed "s#__NAMESPACE__#${K8S_NAMESPACE}#g" k8s/base/09-app-configmap.yaml | kubectl apply -f -
          sed \
            -e "s#__IMAGE__#${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}#g" \
            -e "s#__NAMESPACE__#${K8S_NAMESPACE}#g" \
            k8s/base/10-app-deployment.yaml | kubectl apply -f -
          sed "s#__NAMESPACE__#${K8S_NAMESPACE}#g" k8s/base/11-app-service.yaml | kubectl apply -f -

      - name: Apply ingress when APP_HOST exists
        if: ${{ vars.APP_HOST != '' }}
        run: |
          sed \
            -e "s#__NAMESPACE__#${K8S_NAMESPACE}#g" \
            -e "s#__APP_HOST__#${{ vars.APP_HOST }}#g" \
            k8s/base/12-app-ingress.yaml | kubectl apply -f -

      - name: Rollout status
        run: kubectl -n "${K8S_NAMESPACE}" rollout status deployment/sonar-k8s-demo --timeout=180s
