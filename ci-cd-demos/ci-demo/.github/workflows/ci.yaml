name: CI-CD

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  packages: write

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout application repo
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          echo "Add real tests here"

      - name: Convert owner to lowercase
        id: owner
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        run: |
          IMAGE=ghcr.io/${{ steps.owner.outputs.owner }}/sify-demo-app
          TAG=${GITHUB_SHA::7}
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }} \
            --push .

  update-manifests:
    needs: build-test-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: jitenpalaparthi/sify-demo-app-manifests
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: manifests

      - name: Update deployment image tag
        run: |
          sed -i 's|image: .*|image: '${{ needs.build-test-push.outputs.image }}':'${{ needs.build-test-push.outputs.tag }}'|' manifests/base/deployment.yaml
          echo "Updated deployment.yaml:"
          cat manifests/base/deployment.yaml

      - name: Commit and push manifests
        run: |
          cd manifests
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add base/deployment.yaml
          git commit -m "Update demo-app image to ${{ needs.build-test-push.outputs.tag }}" || echo "No changes to commit"
          git push