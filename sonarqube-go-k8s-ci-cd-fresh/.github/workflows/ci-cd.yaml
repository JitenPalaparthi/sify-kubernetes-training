name: ci-cd

# on:
#   push:
#     tags:
#       - 'v*'
on:
  push:
    branches: ["main"]

jobs:
  build-test-scan-push-deploy:
    # runs-on: self-hosted
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests with coverage
        run: |
          go test ./... -coverprofile=coverage.out

      # - name: SonarQube Scan
      #   uses: SonarSource/sonarqube-scan-action@v5
      #   env:
      #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Compute image name and tag
        run: |
          IMAGE_REPO=$(echo "${{ secrets.DOCKERHUB_USERNAME }}/sonar-go-k8s-demo" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="${GITHUB_REF_NAME}"
          echo "IMAGE_REPO=$IMAGE_REPO" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE=$IMAGE_REPO:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t $IMAGE .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        run: |
          docker push $IMAGE

      - name: Set kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Deploy app to Kubernetes
        run: |
          kubectl apply -f k8s/app/00-namespace.yaml
          sed "s#__IMAGE__#$IMAGE#g" k8s/app/01-deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/app/02-service.yaml