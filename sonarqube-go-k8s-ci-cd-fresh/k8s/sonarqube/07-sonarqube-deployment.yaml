apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube
  namespace: sonarqube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube
  template:
    metadata:
      labels:
        app: sonarqube
    spec:
      containers:
        - name: sonarqube
          image: sonarqube:community
          ports:
            - containerPort: 9000
          envFrom:
            - secretRef:
                name: sonarqube-secret
          volumeMounts:
            - name: data
              mountPath: /opt/sonarqube/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sonarqube-pvc
