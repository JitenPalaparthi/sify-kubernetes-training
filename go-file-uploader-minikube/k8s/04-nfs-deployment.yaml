apiVersion: v1
kind: Namespace
metadata:
  name: upload-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: upload-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      containers:
      - name: nfs-server
        image: itsthenetwork/nfs-server-alpine:12
        securityContext:
          privileged: true
        env:
        - name: SHARED_DIRECTORY
          value: /exports
        ports:
        - containerPort: 2049
          name: nfs
        - containerPort: 20048
          name: mountd
        - containerPort: 111
          name: rpcbind
        volumeMounts:
        - name: nfs-data
          mountPath: /exports
      volumes:
      - name: nfs-data
        hostPath:
          path: /var/lib/minikube-nfs
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-service
  namespace: upload-demo
spec:
  selector:
    app: nfs-server
  clusterIP: None
  ports:
  - name: nfs
    port: 2049
    targetPort: 2049
  - name: mountd
    port: 20048
    targetPort: 20048
  - name: rpcbind
    port: 111
    targetPort: 111
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: shared-nfs-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
  - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-manual
  nfs:
    server: nfs-service.upload-demo.svc.cluster.local
    path: /exports
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-nfs-pvc
  namespace: upload-demo
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  storageClassName: nfs-manual
  volumeName: shared-nfs-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uploader-nfs
  namespace: upload-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uploader-nfs
  template:
    metadata:
      labels:
        app: uploader-nfs
    spec:
      containers:
      - name: app
        image: go-file-uploader:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: uploads
          mountPath: /data/uploads
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: shared-nfs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: uploader-nfs
  namespace: upload-demo
spec:
  selector:
    app: uploader-nfs
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30083
  type: NodePort